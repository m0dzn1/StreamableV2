<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Open Graph / Discord embed tags — populated by JS -->
<meta property="og:type" content="video.other">
<meta property="og:title" id="og-title" content="StreamVault Video">
<meta property="og:description" id="og-desc" content="Watch this video on StreamVault">
<meta property="og:video" id="og-video" content="">
<meta property="og:video:type" content="video/mp4">
<meta property="og:video:width" content="1280">
<meta property="og:video:height" content="720">
<meta property="og:image" id="og-image" content="">
<meta name="twitter:card" content="player">
<meta name="twitter:player" id="tw-player" content="">

<title id="page-title">StreamVault — Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { background: #080808; }

  .watch-layout {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
  }

  .video-stage {
    width: 100%;
    max-width: 1100px;
    padding: 0 20px;
    margin-top: 24px;
  }

  .video-container {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 40px 80px rgba(0,0,0,0.8);
  }

  .video-container video {
    width: 100%;
    max-height: 70vh;
    display: block;
    background: #000;
  }

  .video-info {
    width: 100%;
    max-width: 1100px;
    padding: 24px 20px 0;
  }

  .video-title-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .video-title-main {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700;
    color: var(--text);
    margin: 0;
    line-height: 1.2;
    flex: 1;
  }

  .video-stats {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .stat-item {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .stat-item strong {
    color: var(--accent);
    font-weight: 400;
  }

  .share-panel {
    margin-top: 28px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px 24px;
  }

  .share-panel h3 {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin: 0 0 16px;
  }

  .share-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
  }

  .share-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--text);
    outline: none;
  }

  .not-found {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 16px;
  }

  .not-found-code {
    font-family: 'Space Mono', monospace;
    font-size: 5rem;
    color: rgba(255,255,255,0.06);
    line-height: 1;
  }

  .not-found-msg {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    color: var(--text-dim);
  }

  .not-found a {
    color: var(--accent);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
  }

  .quality-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(var(--accent-rgb), 0.12);
    border: 1px solid rgba(var(--accent-rgb), 0.3);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="noise"></div>

<header>
  <div class="logo">
    <a href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:10px;color:inherit">
      <span class="logo-mark">▶</span>
      <span class="logo-text">StreamVault</span>
    </a>
  </div>
  <nav>
    <a href="index.html" class="nav-link">Upload</a>
  </nav>
</header>

<div class="watch-layout">
  <div id="watchContent" style="width:100%;display:flex;flex-direction:column;align-items:center">
    <div class="video-stage">
      <div class="video-container">
        <video id="mainVideo" controls autoplay preload="auto">
          Your browser does not support video playback.
        </video>
      </div>
    </div>

    <div class="video-info">
      <div class="video-title-row">
        <h1 class="video-title-main" id="videoTitle">Loading...</h1>
        <span class="quality-badge" id="qualityBadge">
          <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg>
          ORIGINAL QUALITY
        </span>
      </div>
      <div class="video-stats" id="videoStats"></div>

      <div class="share-panel">
        <h3>Share this video</h3>
        <div class="share-grid">
          <input type="text" class="share-input" id="watchShareInput" readonly>
          <button class="copy-btn" onclick="copyWatchLink()">Copy Link</button>
        </div>
        <p style="margin: 12px 0 0; font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--text-dim);">
          ✦ Paste this link in Discord — it will embed and play directly in chat.
        </p>
      </div>
    </div>
  </div>

  <div id="notFound" style="display:none" class="not-found">
    <div class="not-found-code">404</div>
    <div class="not-found-msg">Video not found or expired</div>
    <a href="index.html">← Upload a new video</a>
  </div>
</div>

<footer>
  <span>StreamVault — Self-hosted video sharing</span>
  <span>No compression. Original quality. Forever.</span>
</footer>

<script src="app.js"></script>
<script>
  initWatchPage();
</script>
</body>
</html>
